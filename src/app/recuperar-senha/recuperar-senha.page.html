<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha</title>
  <link rel="stylesheet" href="/src/styles/style.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="theme-recuperar">

  <!-- Banner -->
  <div class="img-recuperar banner-recuperar">
    <div class="banner-overlay"></div> <!-- ← sombra -->
    <div class="banner-content-recuperar">
      <h2>Recuperar senha</h2>
      <p>Preencha o formulário abaixo</p>
    </div>
  </div>

  <!-- Card -->
  <div class="recuperar-card-container">
    <div class="recuperar-card">

      <div class="recuperar-text-center">
        <h1>Recuperar senha</h1>
        <p>Depois confira seu email</p>
      </div>

      <!-- Input -->
      <div class="recuperar-input-wrapper">
        <ion-icon name="at-outline"></ion-icon>
        <input type="email" placeholder="Endereço de email">
        <span class="recuperar-required-label">(necessário)</span>
      </div>

      <!-- Botões -->
      <button class="btn-recuperar btn-recuperar-red">SOLICITAR NOVA SENHA</button>
      <button class="btn-recuperar btn-recuperar-green">VOLTAR E ENTRAR</button>
      <button class="btn-recuperar btn-recuperar-blue">EFETUAR NOVO CADASTRO</button>

      <div class="recuperar-footer-links">
        <a href="#">Termos e Privacidade</a>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer-bar-recuperar">
    <a href="#"><ion-icon name="globe-outline"></ion-icon><span>Site</span></a>
    <a href="#"><ion-icon name="logo-facebook"></ion-icon><span>Facebook</span></a>
    <a href="#"><ion-icon name="logo-youtube"></ion-icon><span>Youtube</span></a>
    <a href="#"><ion-icon name="logo-instagram"></ion-icon><span>Instagram</span></a>
    <a href="#"><ion-icon name="mail-outline"></ion-icon><span>E-mail</span></a>
  </div>

</body>
</html>
